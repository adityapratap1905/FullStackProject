services:
  - type: web
    name: backend-validation-automated
    runtime: python
    rootDir: backend-validation-automated
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: backend-validation-automated-db
          property: connectionString

databases:
  - name: backend-validation-automated-db
