<html>

<head>
    <title>Update Email</title>
</head>

<body>
    <h1>Update Email for User ID: {{ user.id }}</h1>
    {% if error %}
        <div style="color: red;">{{ error }}</div>
    {% endif %}
    <form method="post" action="/update_email/{{ user.id }}">
        <label for="old_email">{{ user.email }}</label>
        <input type="email" id="new_email" name="new_email" required><br><br>
        <input type="submit" value="Update Email">
    </form>
</body>

</html>
